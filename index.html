<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="error-container">
        <div class="glitch" data-text="404">404</div>
        <p class="subtitle">¡Oops! Página no encontrada</p>
        <div class="scanlines"></div>
        <div class="noise"></div>
        <p class="error-message">Cambiamos de Hosting visita la nueva pagina de trebor donde llevaremos las actualizaciones</p>
        <a href="https://biografia.pythonanywhere.com/bio/Trebor" class="error-button">IR A LA WEB</a>
    </div>
    <style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&display=swap');

  body {
    background-color: #000;
    overflow: hidden;
  }

  .error-container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Russo One', sans-serif;
    color: #fff;
  }

  .glitch {
    font-size: 150px;
    position: relative;
    animation: glitch 1s linear infinite;
  }

  .glitch::before,
  .glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
  }



  .glow {
    font-size: 150px;
    color: #fff;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: glow 2.5s linear infinite;
  }

  .subtitle {
    font-size: 24px;
    margin-top: 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
    animation: flicker 4s linear infinite;
  }

  .scanlines {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background-size: 100% 4px;
    z-index: 2;
  }

  .noise {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.05;
    z-index: 1;
  }

  .error-message {
    font-size: 18px;
    margin-top: 20px;
    text-align: center;
    max-width: 600px;
    animation: fadeIn 2s ease-in;
  }

  .error-button {
    margin-top: 30px;
    padding: 12px 24px;
    background-color: transparent;
    color: #fff;
    border: 2px solid #fff;
    text-decoration: none;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .error-button:hover {
    background-color: #fff;
    color: #000;
  }

  .error-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,.3), transparent);
    transition: all 0.5s;
  }

  .error-button:hover::before {
    left: 100%;
  }

  
</style>
</body>
</html>
